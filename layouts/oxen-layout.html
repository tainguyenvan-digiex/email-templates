<!doctype html>
<html
  lang="{{lang_code}}"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta
      name="format-detection"
      content="telephone=no,address=no,email=no,date=no,url=no"
    />
    <meta name="color-scheme" content="only dark" />
    <meta name="supported-color-schemes" content="only dark" />
    <title>{{title}}</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Bellfair&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--[if mso]>
      <noscript>
        <xml>
          <o:OfficeDocumentSettings>
            <o:AllowPNG />
            <o:PixelsPerInch>96</o:PixelsPerInch>
          </o:OfficeDocumentSettings>
        </xml>
      </noscript>
      <style type="text/css">
        table,
        td {
          font-family: "DM Sans", Arial, sans-serif !important;
        }
      </style>
    <![endif]-->

    <style type="text/css">
      :root {
        color-scheme: dark only;
      }
      body,
      .body {
        background-color: #0c0d14 !important;
      }
      [data-ogsc] body,
      [data-ogsc] .body {
        background-color: #0c0d14 !important;
      }
      u + .body {
        background-color: #0c0d14 !important;
      }
      img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
        -ms-interpolation-mode: bicubic;
      }
      table,
      td {
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }
    </style>
  </head>
  <body
    class="body"
    style="
      margin: 0;
      padding: 0;
      background-color: #0c0d14;
      color-scheme: dark only;
      -webkit-text-size-adjust: none;
      -ms-text-size-adjust: 100%;
    "
  >
    <!-- Outer wrapper -->
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="background-color: #0c0d14"
    >
      <tr>
        <td align="center" style="padding: 0">
          <!-- 600px email container -->
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="max-width: 600px; width: 100%; background-color: #0c0d14"
          >
            <!-- ========== HEADER: Silk wave + Logo ========== -->
            <tr>
              <td
                align="center"
                style="
                  padding: 0;
                  background-color: #0c0d14;
                  background-image: url(&quot;https://raw.githubusercontent.com/tainguyenvan-digiex/email-templates/main/assets/silk-wave-header.png&quot;);
                  background-size: 600px 240px;
                  background-position: center top;
                  background-repeat: no-repeat;
                "
              >
                <!--[if gte mso 9]><v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:600px;height:240px;"><v:fill type="frame" src="https://raw.githubusercontent.com/tainguyenvan-digiex/email-templates/main/assets/silk-wave-header.png" color="#0C0D14"/><v:textbox inset="0,0,0,0"><div style="text-align:center;"><![endif]-->
                <table
                  role="presentation"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                >
                  <tr>
                    <td style="height: 40px; font-size: 0; line-height: 0">
                      &nbsp;
                    </td>
                  </tr>
                  <tr>
                    <td align="center">
                      <a href="https://oxen.finance" target="_blank">
                        <img
                          src="https://raw.githubusercontent.com/tainguyenvan-digiex/email-templates/main/assets/logo.png"
                          alt="Oxen"
                          width="140"
                          style="display: block; width: 140px; height: auto"
                        />
                      </a>
                    </td>
                  </tr>
                  <tr>
                    <td style="height: 40px; font-size: 0; line-height: 0">
                      &nbsp;
                    </td>
                  </tr>
                </table>
                <!--[if gte mso 9]></div></v:textbox></v:rect><![endif]-->
              </td>
            </tr>

            <!-- Header divider -->
            <tr>
              <td style="padding: 0 32px">
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                >
                  <tr>
                    <td
                      style="
                        border-top: 1px solid rgba(192, 139, 136, 0.08);
                        font-size: 0;
                        line-height: 0;
                        height: 1px;
                      "
                    >
                      &nbsp;
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- ========== BODY CONTENT (injected by each template) ========== -->
            {{{ @content }}}

            <!-- ========== FOOTER ========== -->

            <!-- Footer divider -->
            <tr>
              <td style="padding: 16px 32px 0">
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                >
                  <tr>
                    <td
                      style="
                        border-top: 1px solid rgba(192, 139, 136, 0.08);
                        font-size: 0;
                        line-height: 0;
                        height: 1px;
                      "
                    >
                      &nbsp;
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Automated message -->
            <tr>
              <td
                style="
                  padding: 24px 32px 0 32px;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 11px;
                  color: rgba(245, 240, 235, 0.35);
                  line-height: 18px;
                "
              >
                This is an automated message from Oxen. Please do not reply.
              </td>
            </tr>

            <!-- Legal text -->
            <tr>
              <td
                style="
                  padding: 12px 32px 0 32px;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 10px;
                  color: rgba(245, 240, 235, 0.35);
                  line-height: 16px;
                "
              >
                Oxen is a platform operated by Escrowfy GmbH, Bahnhofstrasse 7,
                6300 Zug, Switzerland (CHE-281.608.494). VQF/SRO Member Nr.
                101009.
              </td>
            </tr>

            <!-- Help · Privacy · Terms -->
            <tr>
              <td
                align="center"
                style="
                  padding: 12px 32px 0 32px;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 11px;
                  line-height: 18px;
                "
              >
                <a
                  href="#"
                  style="color: rgba(245, 240, 235, 0.6); text-decoration: none"
                  >Help Centre</a
                >
                <span style="color: rgba(245, 240, 235, 0.35)"> &middot; </span>
                <a
                  href="#"
                  style="color: rgba(245, 240, 235, 0.6); text-decoration: none"
                  >Privacy Policy</a
                >
                <span style="color: rgba(245, 240, 235, 0.35)"> &middot; </span>
                <a
                  href="#"
                  style="color: rgba(245, 240, 235, 0.6); text-decoration: none"
                  >Terms of Service</a
                >
              </td>
            </tr>

            <!-- Copyright -->
            <tr style="padding-bottom: 20px">
              <td
                align="center"
                style="
                  padding: 8px 32px 0 32px;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 10px;
                  color: rgba(245, 240, 235, 0.35);
                  line-height: 16px;
                "
              >
                © 2026 Oxen Finance
              </td>
            </tr>
          </table>
          <!-- End 600px container -->
        </td>
      </tr>
    </table>
    <!-- End outer wrapper -->
  </body>
</html>
