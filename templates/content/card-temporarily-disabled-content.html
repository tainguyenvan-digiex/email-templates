<!-- 
  Card Temporarily Disabled Content - For use with shared-layout.html
  
  This content file is designed to work with the shared-layout.html layout.
  It contains the card temporarily disabled notification content with security message.
  
  The layout provides: logo, heading, greeting, social media promotion, footer, and unsubscribe sections.
-->

<!-- Card Disabled Information -->
<tr>
  <td style="padding: 0 40px 20px 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="center" style="padding: 20px 0 0">
          <p
            style="
              margin: 0 0 16px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 500;
              line-height: 24px;
              color: #f5f0eb;
              text-align: center;
            "
            class="body-text"
          >
            {{card_disabled_message}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>

<!-- Security Message -->
<tr>
  <td style="padding: 0 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="center" style="padding: 0">
          <p
            style="
              margin: 0 0 20px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 500;
              line-height: 34px;
              color: #f5f0eb;
              text-align: center;
            "
            class="body-text"
          >
            {{security_message}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>
