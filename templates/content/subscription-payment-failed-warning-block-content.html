<!--
  Subscription Payment Failed Warning Content - For use with shared-layout.html

  This content file is designed to work with the shared-layout.html layout.
  It contains the payment failed warning content with defer period notice.

  The layout provides: logo, heading, greeting, social media promotion, footer, and unsubscribe sections.
-->

<!-- Failure Message -->
<tr>
  <td style="padding: 0 40px 20px 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="left" style="padding: 20px 0 0">
          <p
            style="
              margin: 0 0 16px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 500;
              line-height: 22px;
              color: #f5f0eb;
              text-align: left;
            "
            class="body-text"
          >
            {{failure_message}}
          </p>
          <p
            style="
              margin: 0 0 20px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 500;
              line-height: 22px;
              color: #f5f0eb;
              text-align: left;
            "
            class="body-text"
          >
            {{defer_notice_part1}} {{defer_day}} {{defer_notice_part2}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>

<!-- Action Steps -->
<tr>
  <td style="padding: 0 40px 20px 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="left" style="padding: 0">
          <p
            style="
              margin: 0 0 12px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 600;
              line-height: 22px;
              color: #f5f0eb;
              text-align: left;
            "
            class="body-text"
          >
            {{steps_heading}}
          </p>
          <p
            style="
              margin: 0 0 8px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 400;
              line-height: 22px;
              color: #f5f0eb;
              text-align: left;
            "
            class="body-text"
          >
            {{step_1}}
          </p>
          <p
            style="
              margin: 0 0 20px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 400;
              line-height: 22px;
              color: #f5f0eb;
              text-align: left;
            "
            class="body-text"
          >
            {{step_2}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>

<!-- CTA Button -->
<tr>
  <td align="center" style="padding: 0 40px 20px 40px" class="mobile-padding">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
      <tr>
        <td
          style="
            padding: 12px 32px;
            background-color: #c8c8c8;
            background: linear-gradient(
              135deg,
              #e8e8e8 0%,
              #c0c0c0 40%,
              #e0e0e0 50%,
              #a8a8a8 100%
            );
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
              0 2px 8px rgba(0, 0, 0, 0.3),
              inset 0 1px 0 rgba(255, 255, 255, 0.25);
          "
        >
          <a
            href="{{cta_url}}"
            style="
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 16px;
              font-weight: 600;
              color: #000;
              text-decoration: none;
              display: inline-block;
            "
            class="cta-button"
          >
            {{cta_text}}
          </a>
        </td>
      </tr>
    </table>
  </td>
</tr>
