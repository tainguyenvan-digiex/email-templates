<!--
  Verify Email Content - For use with shared-layout.html

  This content file is designed to work with the shared-layout.html layout.
  It contains the email verification with OTP code content.

  The layout provides: logo, heading, greeting, social media promotion, footer, and unsubscribe sections.
-->

<!-- Instruction -->
<tr>
  <td style="padding: 20px 40px 20px 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="left" style="padding: 0">
          <p
            style="
              margin: 0 0 20px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 18px;
              font-weight: 500;
              line-height: 22px;
              color: #f5f0eb;
              text-align: left;
            "
            class="body-text"
          >
            {{instruction}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>

<!-- OTP Code Display -->
<tr>
  <td align="center" style="padding: 0 40px 30px 40px" class="mobile-padding">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td
          align="center"
          style="
            background: linear-gradient(
              188.53deg,
              #e8e8e8 14.645%,
              #c0c0c0 42.929%,
              #e0e0e0 50%,
              #a8a8a8 85.355%
            );
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
              0 2px 8px rgba(0, 0, 0, 0.3),
              inset 0 1px 0 rgba(255, 255, 255, 0.25);
            padding: 24px 40px;
          "
        >
          <p
            style="
              margin: 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 36px;
              font-weight: 700;
              letter-spacing: 8px;
              color: #060709;
              text-align: center;
            "
          >
            {{otp_code}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>

<!-- Validity Notice -->
<tr>
  <td style="padding: 0 40px 0 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="center" style="padding: 0">
          <p
            style="
              margin: 0 0 20px 0;
              font-family: &quot;DM Sans&quot;, Arial, sans-serif;
              font-size: 16px;
              font-weight: 500;
              line-height: 20px;
              color: #f5f0eb;
              text-align: center;
            "
            class="body-text"
          >
            {{validity_notice}}
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>
