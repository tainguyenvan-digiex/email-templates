<!--
  Company Verified Content - For use with oxen-layout.html

  This content file is designed to work with the oxen-layout.html layout.
  It notifies the customer that their company KYB has been approved and surfaces a
  clear next step (Go to Dashboard).

  The layout provides: silk-wave header, logo, sign-off, footer and legal sections.
  Dynamic params injected by the backend: company_name, cta_url (see OnboardingHolderMessageHandler).
-->

<!-- Verification Success Message -->
<tr>
  <td style="padding: 20px 40px 0 40px" class="mobile-padding">
    <p
      style="
        margin: 0;
        font-family: &quot;DM Sans&quot;, Arial, sans-serif;
        font-size: 16px;
        font-weight: 400;
        line-height: 24px;
        color: #f5f0eb;
        text-align: center;
      "
      class="body-text"
    >
      {{verification_success_message}}
    </p>
  </td>
</tr>

<!-- Featured card: Company + Approved status -->
<tr>
  <td style="padding: 24px 40px 0 40px" class="mobile-padding">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        background-color: #12131b;
        border: 1px solid #231e20;
        border-radius: 12px;
      "
    >
      <tr>
        <td style="padding: 24px">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
          >
            <!-- Company -->
            <tr>
              <td
                style="
                  padding: 0 0 14px 0;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 12px;
                  color: #c8c8c8;
                  line-height: 20px;
                  width: 110px;
                  vertical-align: top;
                "
              >
                {{label_company}}
              </td>
              <td
                style="
                  padding: 0 0 14px 0;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 14px;
                  color: #f5f0eb;
                  font-weight: 500;
                  line-height: 20px;
                  vertical-align: top;
                "
              >
                {{company_name}}
              </td>
            </tr>
            <!-- Status -->
            <tr>
              <td
                style="
                  padding: 0;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 12px;
                  color: #c8c8c8;
                  line-height: 24px;
                  width: 110px;
                  vertical-align: middle;
                "
              >
                {{label_status}}
              </td>
              <td
                style="
                  padding: 0;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                  font-size: 14px;
                  color: #f5f0eb;
                  font-weight: 500;
                  line-height: 24px;
                  vertical-align: middle;
                "
              >
                {{status_approved}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </td>
</tr>

<!-- Access message -->
<tr>
  <td style="padding: 20px 40px 0 40px" class="mobile-padding">
    <p
      style="
        margin: 0;
        font-family: &quot;DM Sans&quot;, Arial, sans-serif;
        font-size: 16px;
        font-weight: 400;
        line-height: 24px;
        color: #f5f0eb;
        text-align: center;
      "
      class="body-text"
    >
      {{verification_access_message}}
    </p>
  </td>
</tr>

<!-- CTA Button -->
<tr>
  <td style="padding: 24px 40px 4px 40px" class="mobile-padding">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="center">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0">
            <tr>
              <td
                style="
                  padding: 12px 32px;
                  background-color: #c8c8c8;
                  background: linear-gradient(
                    135deg,
                    #e8e8e8 0%,
                    #c0c0c0 40%,
                    #e0e0e0 50%,
                    #a8a8a8 100%
                  );
                  border-radius: 40px;
                  border: 1px solid rgba(255, 255, 255, 0.15);
                  box-shadow:
                    0 2px 8px rgba(0, 0, 0, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25);
                "
              >
                <a
                  href="{{cta_url}}"
                  target="_blank"
                  style="
                    font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                    font-size: 16px;
                    font-weight: 600;
                    color: #000;
                    text-decoration: none;
                    display: block;
                    text-align: center;
                  "
                >
                  {{cta_text}}
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </td>
</tr>
